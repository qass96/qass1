<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QASS — QA 증적 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 화면 -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo">QASS</div>
      <p class="auth-subtitle">QA 증적 관리 플랫폼</p>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="이메일" required autocomplete="email" />
        <input type="password" id="auth-password" placeholder="비밀번호" required autocomplete="current-password" />
        <div id="auth-name-wrap" class="hidden">
          <input type="text" id="auth-name" placeholder="이름 (팀원에게 표시될 이름)" autocomplete="name" />
        </div>
        <button type="submit" class="btn-auth" id="auth-submit">로그인</button>
        <p id="auth-error" class="auth-error hidden"></p>
        <p id="auth-notice" class="auth-notice hidden"></p>
      </form>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="dashboard" class="hidden">
    <header class="topbar">
      <div class="topbar-brand">QASS</div>
      <div class="topbar-center">
        <span id="realtime-badge" class="realtime-badge hidden">● 실시간 연결됨</span>
      </div>
      <div class="topbar-right">
        <span id="user-email" class="user-email-label"></span>
        <button id="btn-logout" class="btn-sm">로그아웃</button>
      </div>
    </header>

    <div class="toolbar">
      <input type="text" id="search" class="search-input" placeholder="URL 또는 페이지 제목으로 검색…" />
      <select id="filter-user" class="filter-select">
        <option value="">전체 사용자</option>
      </select>
      <button id="btn-dl-zip" class="btn-sm btn-primary">⬇ ZIP 다운로드</button>
      <span id="count-label" class="count-label">불러오는 중…</span>
    </div>

    <div id="captures-grid" class="captures-grid">
      <div class="empty-state">캡처된 증적이 없습니다.</div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- 확장 설치 안내 모달 -->
  <div id="ext-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>확장 프로그램 설치 안내</h2>
      <p>QASS 확장 프로그램을 설치하면 브라우저에서 QA 화면을 캡처하고<br>자동으로 이 대시보드에 업로드할 수 있습니다.</p>
      <ol class="ext-steps">
        <li>확장 프로그램 파일을 다운로드합니다.</li>
        <li>Chrome → 확장 프로그램 → 개발자 모드 ON</li>
        <li>압축 해제된 폴더를 드래그하거나 "압축 해제된 확장 프로그램 로드"를 클릭합니다.</li>
        <li>확장 팝업에서 이 계정으로 로그인합니다.</li>
      </ol>
      <button id="btn-close-modal" class="btn-auth" style="margin-top:8px;">확인</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
